<div class="theme-switch-wrapper">
    <span style="margin-right: 8px; font-size: 0.8rem" id="theme-label-icon"
        >🌙</span
    >
    <div class="theme-switch" id="theme-toggle-switch">
        <div class="slider"></div>
    </div>
</div>

<script>
    const themeSwitch = document.getElementById("theme-toggle-switch");
    const labelIcon = document.getElementById("theme-label-icon");

    function updateSwitchUI(theme) {
        const isDark = theme === "dark";
        if (isDark) {
            themeSwitch.classList.add("is-active");
        } else {
            themeSwitch.classList.remove("is-active");
        }

        if (labelIcon) {
            labelIcon.textContent = isDark ? "☀️" : "🌙";
        }
    }

    function toggleTheme() {
        const isDark = document.body.classList.contains("is-dark");
        const nextTheme = isDark ? "light" : "dark";

        localStorage.setItem("theme", nextTheme);
        applyTheme(nextTheme);
        updateSwitchUI(nextTheme);
    }

    // Initial switch state based on current body class
    window.addEventListener("DOMContentLoaded", () => {
        const currentTheme = document.body.classList.contains("is-dark")
            ? "dark"
            : "light";
        updateSwitchUI(currentTheme);
    });

    themeSwitch.addEventListener("click", toggleTheme);
</script>
