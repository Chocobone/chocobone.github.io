<div
    id="theme-toggle"
    style="
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 20px;
        margin-top: 5px;
    "
>
    <h6 id="theme-toggle-text" style="margin: 0">[Dark]</h6>
</div>

<script>
    (function () {
        const themeToggle = document.getElementById("theme-toggle");
        const themeToggleText = document.getElementById("theme-toggle-text");

        function updateUI(isDark) {
            if (themeToggleText) {
                themeToggleText.textContent = isDark ? "[Light]" : "[Dark]";
            }
        }

        // Initialize UI based on current body state
        window.addEventListener("DOMContentLoaded", () => {
            const isDark = document.body.classList.contains("is-dark");
            updateUI(isDark);
        });

        themeToggle.addEventListener("click", () => {
            const isCurrentlyDark = document.body.classList.contains("is-dark");
            const nextTheme = isCurrentlyDark ? "light" : "dark";

            localStorage.setItem("theme", nextTheme);
            if (typeof applyTheme === "function") {
                applyTheme(nextTheme);
                updateUI(!isCurrentlyDark);
            }
        });
    })();
</script>
