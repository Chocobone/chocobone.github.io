<head>
    <meta charset="UTF-8" />

    <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
        name="description"
        content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.title }}{% endif %}"
    />

    <meta property="og:site_name" content="{{ site.title }}" />

    <link
        rel="icon"
        type="image/png"
        href="data:image/png;base64,iVBORw0KGgo="
    />

    <!-- Fonts: Local Assets First -->
    <style>
        @font-face {
            font-family: "DungGeunMo";
            src: url("{{ site.baseurl }}/assets/fonts/DungGeunMo.woff")
                format("woff");
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* Adjust English font sizes to match CJK fonts */
        @font-face {
            font-family: "Kongtext";
            src: url("https://fonts.cdnfonts.com/s/14354/Kongtext-Regular.woff")
                format("woff");
            size-adjust: 85%;
        }

        @font-face {
            font-family: "Press Start 2P";
            src: url("https://fonts.gstatic.com/s/pressstart2p/v15/e3t4euO8tx-d7S7grdqfK3W_P2125_7XBrZSwvS2.woff2")
                format("woff2");
            unicode-range:
                U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA,
                U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193,
                U+2212, U+2215, U+FEFF, U+FFFD;
            size-adjust: 80%;
        }
    </style>

    <!-- Fonts: Japanese (DotGothic16) -->
    <link
        href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap"
        rel="stylesheet"
    />

    <link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet" />
    <style>
        /* Global font application via SCSS will handle specific overrides */
        html,
        body,
        pre,
        code,
        kbd,
        samp {
            font-family:
                "Kongtext", "DungGeunMo", "DotGothic16", "Press Start 2P",
                cursive !important;
        }
    </style>

    <link rel="stylesheet" href="{{ site.baseurl }}/styles.css" />

    <script>
        function applyTheme(theme) {
            const isDark = theme === "dark";

            // Apply to both attribute and class for maximum compatibility
            if (isDark) {
                document.documentElement.setAttribute("data-theme", "dark");
                document.body.classList.add("is-dark");
            } else {
                document.documentElement.removeAttribute("data-theme");
                document.body.classList.remove("is-dark");
            }

            // Apply is-dark class to NES.css components that need it
            document
                .querySelectorAll(
                    ".nes-container, .nes-btn, .nes-input, .nes-textarea, .nes-select select, .nes-table, .nes-balloon, .nes-list, .nes-text",
                )
                .forEach((el) => {
                    el.classList.toggle("is-dark", isDark);
                });

            // Special handling for the theme-toggle elements
            const toggleText = document.getElementById("theme-toggle-text");
            if (toggleText) {
                toggleText.textContent = isDark ? "Light Mode" : "Dark Mode";
            }
        }

        (function () {
            const theme = localStorage.getItem("theme");
            const prefersDark = window.matchMedia(
                "(prefers-color-scheme: dark)",
            ).matches;
            const isDark = theme === "dark" || (!theme && prefersDark);

            // Initial application to prevent flicker
            if (isDark) {
                document.documentElement.setAttribute("data-theme", "dark");
                document.documentElement.classList.add("is-dark");
            }

            window.addEventListener("DOMContentLoaded", () => {
                if (isDark) {
                    document.documentElement.classList.remove("is-dark");
                    applyTheme("dark");
                } else {
                    applyTheme("light");
                }
            });
        })();
    </script>

    {% if page.excerpt %}
    <meta
        property="og:description"
        content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}"
    />
    {% else %}
    <meta
        property="og:description"
        content="{{ site.title | strip_html | strip_newlines | truncate: 160 }}"
    />
    {% endif %} {% if page.title %}
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="og:type" content="article" />
    {% else %}
    <meta property="og:title" content="{{ site.title }}" />
    <meta property="og:type" content="website" />
    {% endif %} {% if page.date %}
    <meta
        property="article:published_time"
        content="{{ page.date | date_to_xmlschema }}"
    />
    <meta property="article:author" content="{{ site.url }}/" />
    {% endif %}

    <meta property="og:url" content="{{ site.url }}{{ page.url }}" />

    {% if page.image %}
    <meta property="og:image" content="{{ site.url }}{{ page.image }}" />
    {% endif %}

    <title>
        {% if page.id == "home" %} {{ site.title }} {% else %} {{ page.title }}
        &mdash; {{ site.title }} {% endif %}
    </title>
</head>
